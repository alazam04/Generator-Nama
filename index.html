<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator & Link Order</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#eef2f7;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  font-weight:bold;
}

/* CARD */
.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#3b82f6,#06b6d4);
  color:white;
  cursor:pointer;
}

/* LIST */
.item{
  background:#f8fafc;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
}

.item a{
  text-decoration:none;
  color:#3b82f6;
  font-size:13px;
}

/* NAV */
.navbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.navbar div{
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">✨ GENERATOR & ORDER ✨</div>

<!-- MENU NAMA -->
<div id="menuNama" class="card">
  <h3>NAMA</h3>
  <button class="btn" onclick="generateNama()">Generate Nama</button>
  <div id="hasil" style="margin-top:10px;font-weight:bold;"></div>
</div>

<!-- MENU LINK -->
<div id="menuLink" class="card" style="display:none;">
  <h3>LINK ORDER</h3>
  <div id="links"></div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div onclick="showMenu('nama')">🏠<br>Nama</div>
  <div onclick="showMenu('link')">🛒<br>Order</div>
</div>

<script>
// ====== GENERATOR NAMA ======
const depan=["Ahmad","Budi","Siti","Rina","Michael","Aisyah","Daniel","Putri"];
const belakang=["Santoso","Wijaya","Saputra","Pratama","Smith","Brown","Rahman"];

function random(a){return a[Math.floor(Math.random()*a.length)]}

function generateNama(){
  let nama=random(depan)+" "+random(belakang);
  document.getElementById("hasil").innerText=nama;
  navigator.clipboard.writeText(nama);
}

// ====== MENU SWITCH ======
function showMenu(menu){
  document.getElementById("menuNama").style.display=(menu==="nama")?"block":"none";
  document.getElementById("menuLink").style.display=(menu==="link")?"block":"none";
}

// ====== DATA LINK ORDER ======
const data = [
{nama:"AWAW", link:"https://s.shopee.co.id/6VKFY7rZoL"},
{nama:"AWAW", link:"https://s.shopee.co.id/6px5wm8CN6"},
{nama:"AWAW", link:"https://s.shopee.co.id/901aWmbQPp"},
{nama:"AWAW", link:"https://s.shopee.co.id/7ppd8fwWIc"},

{nama:"WHITE CYBER", link:"https://s.shopee.co.id/9fHHK4KU73"},
{nama:"ALFA DIGITAL", link:"https://s.shopee.co.id/4qC1ZEp4uu"},
{nama:"SRIBUFOLLS", link:"https://s.shopee.co.id/3Vgdyp7e4p"},
{nama:"HELENA STUFF", link:"https://s.shopee.co.id/AADXv6H81t"},
{nama:"SECRET PANEL", link:"https://s.shopee.co.id/4AwKm7hE75"},
{nama:"PROMETIXPANEL", link:"https://s.shopee.co.id/9KeQve7UK9"},
{nama:"YOAKE", link:"https://s.shopee.co.id/8fOk8T99r5"},
{nama:"YOAKE", link:"https://s.shopee.co.id/3LNDmhKKrw"},

{nama:"MAMA - WHITE CYBER", link:"https://s.shopee.co.id/2g7J598NmS"}
];

// ====== RENDER LINK ======
function renderLinks(){
  let html="";
  data.forEach(d=>{
    html+=`
      <div class="item">
        <b>${d.nama}</b><br>
        <a href="${d.link}" target="_blank">${d.link}</a>
      </div>
    `;
  });
  document.getElementById("links").innerHTML=html;
}

renderLinks();
</script>

</body>
</html>
