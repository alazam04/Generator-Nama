<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator Nama Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #eef2f7;
}

.header {
  text-align: center;
  padding: 20px;
  font-weight: bold;
  font-size: 20px;
}

.card {
  background: white;
  margin: 15px;
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg,#3b82f6,#06b6d4);
  color: white;
  font-size: 15px;
  cursor: pointer;
}

.input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin: 8px 0;
}

.item {
  background: #f8fafc;
  padding: 10px;
  border-radius: 10px;
  margin-top: 6px;
}

.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  opacity: 0;
  transition: 0.3s;
}
.toast.show { opacity: 1; }

.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  box-shadow: 0 -3px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="header">✨ GENERATOR NAMA PRO ✨</div>

<div class="card">

<select id="kategori" class="input">
  <option value="islami">Islami</option>
  <option value="indonesia">Indonesia</option>
  <option value="luar">Luar Negeri</option>
</select>

<select id="gender" class="input">
  <option value="l">Laki-laki</option>
  <option value="p">Perempuan</option>
</select>

<button class="btn" onclick="generateNama()">🔀 Generate & Copy</button>

<div id="hasil" style="margin-top:10px;text-align:center;font-weight:bold;"></div>

</div>

<div class="card">
  <b>Riwayat</b>
  <div id="list"></div>
</div>

<div class="navbar">
  <div>🏠</div>
  <div>⭐</div>
  <div>🕒</div>
  <div>⚙️</div>
</div>

<div id="toast" class="toast">Disalin!</div>

<script>
// DATA BESAR (1000+ kombinasi per kategori)

const islamiL = ["Ahmad","Muhammad","Ali","Hassan","Husain","Yusuf","Ibrahim","Ismail","Umar","Zaid","Harun","Fahmi","Rizki","Salman","Taufik","Imran","Akbar","Fikri","Rafi","Zaki","Ilham","Naufal","Azmi"];
const islamiP = ["Aisyah","Fatimah","Zahra","Khadijah","Maryam","Safira","Nabila","Aulia","Salsabila","Amira","Hana","Rania","Najwa","Syifa","Raisa"];

const indoL = ["Budi","Agus","Joko","Bayu","Dedi","Eko","Hendra","Rudi","Tono","Wahyu","Rizky","Fajar","Arif","Yoga","Dimas"];
const indoP = ["Siti","Dewi","Rina","Putri","Wati","Lestari","Indah","Sari","Ayu","Ningsih","Kartika","Fitri"];

const luarL = ["Daniel","Michael","Lucas","Ethan","James","David","Noah","Henry","Leo","Jack","Ryan","Adam"];
const luarP = ["Sophia","Emma","Olivia","Ava","Mia","Lily","Chloe","Ella","Grace","Zoe","Hannah"];

const tengah = ["Rahman","Saputra","Wijaya","Pratama","Nugraha","Santoso","Hakim","Karim","Maulana","Firdaus","Anderson","Smith","Brown","Taylor"];

function random(a){return a[Math.floor(Math.random()*a.length)]}

let riwayat = JSON.parse(localStorage.getItem("riwayat"))||[];

function showToast(){
  let t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

function generateNama(){
  let kategori = document.getElementById("kategori").value;
  let gender = document.getElementById("gender").value;

  let depan, mid, belakang;

  if(kategori==="islami"){
    depan = (gender==="l") ? random(islamiL) : random(islamiP);
  } else if(kategori==="indonesia"){
    depan = (gender==="l") ? random(indoL) : random(indoP);
  } else {
    depan = (gender==="l") ? random(luarL) : random(luarP);
  }

  mid = random(tengah);
  belakang = random(tengah);

  let nama = depan + " " + mid + " " + belakang;

  document.getElementById("hasil").innerText = nama;

  navigator.clipboard.writeText(nama);
  showToast();

  riwayat.unshift(nama);
  localStorage.setItem("riwayat", JSON.stringify(riwayat));
  render();
}

function render(){
  let html="";
  riwayat.slice(0,10).forEach(e=>{
    html+=`<div class="item">${e}</div>`;
  });
  document.getElementById("list").innerHTML=html;
}

render();
</script>

</body>
</html>
