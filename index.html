<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Tool Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{ margin:0; font-family:'Poppins',sans-serif; background:#0f172a; color:white; }
.header{ padding:20px; text-align:center; font-size:18px; font-weight:700; background:linear-gradient(90deg,#3b82f6,#06b6d4); }
.container{ padding:15px; }
.card{ background:#1e293b; margin-bottom:15px; padding:15px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.3); }
.title{ font-size:14px; font-weight:600; margin-bottom:10px; color:#93c5fd; }
.btn{ width:100%; padding:12px; border:none; border-radius:10px; background:linear-gradient(90deg,#3b82f6,#06b6d4); color:white; font-weight:600; cursor:pointer; transition: 0.3s; }
.btn:active{ transform: scale(0.98); }
.btn-shopee{ background:linear-gradient(90deg,#ee4d2d,#ff7337); text-transform: uppercase; margin-top: 5px; } 
.select-op{ width:100%; padding:10px; border-radius:10px; border:none; background:#0f172a; color:white; margin-bottom:8px; outline:none; font-family:'Poppins'; font-size: 13px; }
.otp-box{ font-size:28px; font-weight:700; color:#fbbf24; margin-top:15px; text-align: center; border: 2px dashed #475569; padding: 15px; border-radius: 12px; background: #111827; }
.info-row{ font-size:13px; color:#94a3b8; display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding: 5px 0; border-bottom: 1px solid #334155; }
.val{ color: white; font-weight: 600; }
.copy-btn{ padding:4px 10px; border:none; border-radius:6px; background:#3b82f6; color:white; font-size:11px; cursor:pointer; }
</style>
</head>
<body>
<div class="header">⚡ PREMIUM TOOL PANEL</div>
<div class="container">

<div class="card">
  <div class="title">🛍️ SHOPEE OTP HERO</div>
  
  <div style="font-size: 11px; color: #94a3b8; margin-bottom: 5px;">Pilih Operator:</div>
  <select class="select-op" id="operator">
    <option value="any">Semua Operator (Otomatis)</option>
    <option value="telkomsel">Telkomsel</option>
    <option value="indosat">Indosat</option>
    <option value="xl">XL Axiata</option>
    <option value="three">Tri (3)</option>
    <option value="axis">Axis</option>
  </select>

  <div style="font-size: 11px; color: #94a3b8; margin-bottom: 5px;">Prioritas:</div>
  <select class="select-op" id="prioritas">
    <option value="cheap">Harga Termurah (Sangat Disarankan)</option>
    <option value="fast">Cepat Diterima (Harga Standar)</option>
  </select>

  <button class="btn btn-shopee" onclick="pesanNomor()">Ambil Nomor Termurah</button>

  <div class="info-row"><span>Order ID</span><span class="val" id="id">-</span></div>
  <div class="info-row">
    <span>Nomor HP</span>
    <div>
      <span class="val" id="nomor">-</span>
      <button id="btnCopy" class="copy-btn" style="display:none; margin-left:8px;" onclick="copyTeks('nomor')">Copy</button>
    </div>
  </div>
  <div class="otp-box" id="otp">WAITING</div>
  <div id="status" style="font-size:11px; color:#60a5fa; text-align:center; margin-top:8px; font-style:italic;"></div>
</div>

<div class="card">
  <div class="title">🔗 Link Order</div>
  <div id="links"></div>
</div>

</div>

<script>
function copyTeks(id) {
  const t = document.getElementById(id).innerText;
  if(t && t !== "-") { navigator.clipboard.writeText(t); alert("Berhasil dicopy!"); }
}

let orderID = "";
let timer;

function pesanNomor(){
  const svc = "ka"; 
  const op = document.getElementById("operator").value;
  
  document.getElementById("nomor").innerText = "Mencari harga termurah...";
  document.getElementById("otp").innerText = "WAITING";
  document.getElementById("status").innerText = "Menghubungi server Hero-SMS...";
  document.getElementById("btnCopy").style.display = "none";
  
  // Mengirim request ke Cloudflare
  fetch(`https://aihomestore.alazam04.workers.dev/api/order?service=${svc}&operator=${op}`)
  .then(r => r.json())
  .then(d => {
    if(d.number){
      orderID = d.id;
      document.getElementById("id").innerText = d.id;
      document.getElementById("nomor").innerText = d.number;
      document.getElementById("btnCopy").style.display = "inline-block";
      document.getElementById("status").innerText = "Berhasil dapat nomor termurah!";
      navigator.clipboard.writeText(d.number);
      clearInterval(timer);
      timer = setInterval(cekOTP, 5000);
    } else {
      alert("Gagal: " + (d.error || "Stok termurah habis, coba ganti operator"));
      document.getElementById("nomor").innerText = "-";
      document.getElementById("status").innerText = "";
    }
  });
}

function cekOTP(){
  if(!orderID) return;
  fetch(`https://aihomestore.alazam04.workers.dev/api/check?id=${orderID}`)
  .then(r => r.json())
  .then(d => {
    if(d.otp && d.otp !== "-"){
      document.getElementById("otp").innerText = d.otp;
      document.getElementById("status").innerText = "SMS MASUK!";
      navigator.clipboard.writeText(d.otp);
      clearInterval(timer); 
    }
  });
}

const links = [{n:"AWAW",l:"https://s.shopee.co.id/6VKFY7rZoL"},{n:"WHITE CYBER",l:"https://s.shopee.co.id/9fHHK4KU73"},{n:"ALFA DIGITAL",l:"https://s.shopee.co.id/4qC1ZEp4uu"}];
let h = "";
links.forEach(x => {
  h += `<div style="background:#0f172a; padding:10px; border-radius:10px; margin-top:8px; font-size:12px;">
    <b>${x.n}</b><br>${x.l}
    <button onclick="navigator.clipboard.writeText('${x.l}')" style="width:100%; margin-top:5px; padding:5px; border-radius:5px; border:none; background:#334155; color:white; font-size:11px; cursor:pointer;">Copy Link</button>
  </div>`;
});
document.getElementById("links").innerHTML = h;
</script>
</body>
</html>
